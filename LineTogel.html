function isGreet(t){ const l=t.toLowerCase(); return /^(halo|hlo|helo|hello|hi|hay|hy|hoy|pagi|siang|sore|malam|assalam|bro|boss|bos|cs|admin|permisi|met ).{0,15}$/i.test(l.trim()); }
function isThanks(t){ const l=t.toLowerCase().trim(); return l.length<30 && /^(terima|makas|thanks|thx|tks|trs|suwun|nuhun|ok$|oke$|sip$|siap$|paham$|mengerti$|udah$|sudah$|ga usah|gak usah|tidak usah|noted|noted|mantap|mantap|nice|keren|bagus|sip)/i.test(l); }

function findMatch(input){
    const lower = input.toLowerCase().trim();
    let best=null, bestScore=0;
    for(const entry of KB){
        let score=0;
        for(const kw of entry.keywords){
            if(lower.includes(kw)){
                score+=kw.length*2;
                if(lower===kw) score+=25;
                if(lower.startsWith(kw)) score+=8;
                // Bonus untuk keyword yang lebih panjang (lebih spesifik)
                if(kw.length>5) score+=5;
            }
        }
        if(score>bestScore){bestScore=score;best=entry;}
    }
    return {match:best,score:bestScore};
}

function getResponse(raw){
    const corrected = correctTypos(raw);
    const trimmed = raw.trim();
    if(!trimmed) return null;
    if(isGreet(trimmed)) return greetRes[Math.floor(Math.random()*greetRes.length)];
    if(isThanks(trimmed)) return thankRes[Math.floor(Math.random()*thankRes.length)];

    const {match,score}=findMatch(corrected);
    if(match && score>=6) return match.response;
    if(trimmed.length<4) return "Bosku, bisa dijelaskan lebih detail? 😊";
    return fallbackRes[Math.floor(Math.random()*fallbackRes.length)];
}
