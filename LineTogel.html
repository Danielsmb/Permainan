<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Rekening Bank</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f7f9fc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 15px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { text-align: center; color: #007bff; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cek Rekening Bank</h2>
    
    <label for="bankCode">Pilih Bank:</label>
    <select id="bankCode">
        <option value="">-- Pilih Bank --</option>
        <option value="BCA">BCA</option>
        <option value="BRI">BRI</option>
        <option value="MANDIRI">Mandiri</option>
        <option value="BNI">BNI</option>
        <option value="BSI">BSI</option>
        <option value="PERMATA">Permata</option>
    </select>

    <label for="accountNumber">Nomor Rekening:</label>
    <input type="text" id="accountNumber" placeholder="Contoh: 888801000157555" />

    <button id="validateBtn" onclick="validateAccount()">Cek Sekarang</button>
    
    <div id="loading" class="loading">⏳ Sedang mengecek ke server Xendit...</div>
    <div id="result" class="result"></div>
</div>

<script>
    async function validateAccount() {
        const bankCode = document.getElementById('bankCode').value;
        const accountNumber = document.getElementById('accountNumber').value;
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const btn = document.getElementById('validateBtn');

        // Reset tampilan
        resultDiv.style.display = 'none';
        resultDiv.className = 'result';
        
        if (!bankCode || !accountNumber) {
            showError('Harap pilih bank dan masukkan nomor rekening.');
            return;
        }

        // Tampilkan loading, disable tombol
        loadingDiv.style.display = 'block';
        btn.disabled = true;
        btn.innerText = 'Memproses...';

        try {
            const response = await fetch('/api/validate-bank', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bank_code: bankCode, account_number: accountNumber })
            });

            const data = await response.json();

            if (data.success) {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <strong>✅ Rekening Valid!</strong><br><br>
                    <p style="margin:0;">Bank: <strong>${bankCode}</strong></p>
                    <p style="margin:0;">No Rekening: <strong>${data.account_number}</strong></p>
                    <p style="margin:5px 0 0 0; font-size:18px; color:#155724;">Nama Pemilik: <strong>${data.account_holder}</strong></p>
                `;
            } else {
                showError(data.error || 'Rekening tidak ditemukan atau error.');
            }
        } catch (err) {
            showError('Gagal terhubung ke server backend. Pastikan server Node.js sudah jalan.');
        }

        // Hilangkan loading, aktifkan tombol
        loadingDiv.style.display = 'none';
        btn.disabled = false;
        btn.innerText = 'Cek Sekarang';
        resultDiv.style.display = 'block';
    }

    function showError(message) {
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>❌ Gagal Validasi</strong><br>${message}`;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
