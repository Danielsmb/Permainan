<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Online - Live Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a26;
            --bg-chat: #141420;
            --accent: #e6a817;
            --accent-dim: rgba(230,168,23,0.15);
            --accent-glow: rgba(230,168,23,0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --border: #2a2a3a;
            --success: #22c55e;
            --danger: #ef4444;
            --bot-bubble: #1e1e2e;
            --user-bubble: #2a2210;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(230,168,23,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(230,168,23,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(100,50,200,0.02) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-2%, -1%) rotate(2deg); }
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        @media (min-width: 520px) {
            .chat-container {
                height: 96vh;
                max-height: 900px;
                border-radius: 20px;
                border: 1px solid var(--border);
                box-shadow: 
                    0 0 80px rgba(230,168,23,0.06),
                    0 25px 60px rgba(0,0,0,0.5);
            }
        }

        /* Header */
        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a1a28 0%, #141420 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #d4940f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #000;
            font-weight: 800;
            position: relative;
            flex-shrink: 0;
        }

        .header-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border: 2.5px solid var(--bg-secondary);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }

        .header-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .header-info p {
            font-size: 12px;
            color: var(--success);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .header-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(230,168,23,0.3);
        }

        /* Chat area */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bg-chat);
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Date separator */
        .date-sep {
            text-align: center;
            margin: 12px 0;
        }

        .date-sep span {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Messages */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-row.bot { align-self: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            margin-top: 2px;
        }

        .msg-row.bot .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #d4940f);
            color: #000;
        }

        .msg-row.user .msg-avatar {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.65;
            letter-spacing: -0.005em;
            word-break: break-word;
        }

        .msg-row.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
            color: var(--text-primary);
        }

        .msg-row.user .msg-bubble {
            background: linear-gradient(135deg, #3d2e0a, #2a2210);
            border: 1px solid rgba(230,168,23,0.2);
            border-top-right-radius: 4px;
            color: #f5e6b8;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .msg-row.user .msg-time { text-align: right; }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 0 16px;
            gap: 10px;
            align-items: center;
        }

        .typing-indicator.show { display: flex; }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-top-left-radius: 4px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Quick replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 16px 4px;
        }

        .quick-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            color: var(--text-secondary);
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(230,168,23,0.3);
            transform: translateY(-1px);
        }

        .quick-btn:active { transform: scale(0.97); }

        /* Input area */
        .chat-input-area {
            padding: 14px 16px;
            background: linear-gradient(135deg, #1a1a28 0%, #141420 100%);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(230,168,23,0.4);
            box-shadow: 0 0 0 3px rgba(230,168,23,0.08);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            padding: 8px 0;
            resize: none;
            max-height: 100px;
            line-height: 1.5;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #d4940f);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(230,168,23,0.3); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

        .input-hint {
            text-align: center;
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Scroll to bottom btn */
        .scroll-bottom {
            position: absolute;
            bottom: 90px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            z-index: 5;
            transition: all 0.2s;
        }

        .scroll-bottom.show { display: flex; }
        .scroll-bottom:hover { background: var(--accent-dim); color: var(--accent); }

        @media (max-width: 520px) {
            .chat-container { max-width: 100%; border: none; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-avatar">CS</div>
        <div class="header-info">
            <h3>Customer Service</h3>
            <p><i class="fas fa-circle" style="font-size:6px"></i> Online - Siap Melayani</p>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="clearChat()" title="Bersihkan Chat"><i class="fas fa-trash-can"></i></button>
        </div>
    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chatBody">
        <div class="date-sep"><span id="dateLabel"></span></div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">
        <div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),#d4940f);color:#000;width:32px;height:32px;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">CS</div>
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Scroll to bottom -->
    <button class="scroll-bottom" id="scrollBtn" onclick="scrollToBottom()"><i class="fas fa-chevron-down"></i></button>

    <!-- Input Area -->
    <div class="chat-input-area">
        <div class="input-wrapper">
            <textarea class="chat-input" id="chatInput" placeholder="Ketik pesan, bosku..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="input-hint">Dilayani oleh CS Online 24 Jam</div>
    </div>
</div>

<script>
// =============================================
// DATABASE PENGETAHUAN PERMAINAN JUDI ONLINE
// =============================================

const knowledgeBase = [
    // === TOGEL ===
    {
        keywords: ["togel", "lotre", "lottery", "tebak angka", "nomor", "angka togel"],
        response: `Bosku, togel atau Toto Gelap adalah permainan menebak angka yang akan keluar. Di platform kami tersedia beberapa pasaran resmi:\n\n📌 **Pasaran Populer:**\n• **SGP (Singapore)** - Buka setiap Senin, Rabu, Kamis, Sabtu, Minggu pukul 17:45 WIB\n• **HK (Hongkong)** - Buka setiap hari pukul 23:00 WIB\n• **SYDNEY** - Buka setiap hari pukul 13:50 WIB\n• **CAMBODIA** - Buka setiap hari pukul 11:50 WIB\n• **TAIWAN** - Buka setiap hari pukul 20:45 WIB\n• **CHINA** - Buka setiap hari pukul 15:30 WIB\n\n📌 **Jenis Taruhan Togel:**\n• **4D/3D/2D** - Menebak 4, 3, atau 2 angka (hadiah sangat besar)\n• **Colok Bebas** - Menebak 1 angka di posisi manapun\n• **Colok Jitu** - Menebak 1 angka di posisi tepat\n• **Colok Naga** - Menebak 3 angka bebas posisi\n• **Shio** - Menebak shio dari 2D belakang\n• **Tengah/Tepi** - Menebab nilai tengah atau tepi\n• **Dasar** - Ganjil/Genap + Besar/Kecil dari penjumlahan 2D\n• **50:50** - Ganjil/Genap, Besar/Kecil\n• **Kembang/Kempis** - Pola angka head/tail\n• **Silang Homo** - Ganjil/Genap head dan tail\n\nBosku mau tahu lebih detail tentang pasaran atau jenis taruhan tertentu?`
    },
    {
        keywords: ["cara pasang togel", "pasang togel", "taruh togel", "bet togel", "main togel"],
        response: `Bosku, cara pasang togel di platform kami sangat mudah sekali:\n\n📌 **Langkah-langkah:**\n1️⃣ Login ke akun bosku\n2️⃣ Pilih menu **TOGEL** di sidebar\n3️⃣ Pilih **pasaran** yang bosku inginkan (SGP, HK, SYD, dll)\n4️⃣ Masukkan **angka** yang ingin dipasang\n5️⃣ Pilih **jenis taruhan** (4D, 3D, 2D, Colok, dll)\n6️⃣ Masukkan **nominal bet** (minimal bet sangat terjangkau)\n7️⃣ Klik **KIRIM** dan tunggu result\n\n📌 **Tips dari CS:**\n• Pastikan saldo mencukupi sebelum pasang\n• Perhatikan **jam tutup pasaran** agar tidak terlambat\n• Cek kembali angka dan jenis taruhan sebelum submit\n• Struk taruhan bisa dilihat di menu **Riwayat Taruhan**\n\nBosku mau saya bantu penjelasan jenis taruhan togel tertentu?`
    },
    {
        keywords: ["hadiah togel", "diskon togel", "bayaran togel", "payout togel", "odds togel"],
        response: `Bosku, berikut info hadiah dan diskon togel di platform kami:\n\n📌 **Diskon Taruhan:**\n• **4D** → Diskon **66%** (pasang 1000, deduct 340)\n• **3D** → Diskon **59%** (pasang 1000, deduct 410)\n• **2D** → Diskon **29%** (pasang 1000, deduct 710)\n\n📌 **Hadiah Full (Tanpa Diskon):**\n• **4D** → x3000 (pasang 1000, menang 3.000.000)\n• **3D** → x400 (pasang 1000, menang 400.000)\n• **2D** → x70 (pasang 1000, menang 70.000)\n\n📌 **Hadiah Diskon:**\n• **4D** → x2800\n• **3D** → x380\n• **2D** → x68\n\n📌 **Hadiah Lainnya:**\n• Colok Bebas → x1.55\n• Colok Jitu → x8\n• Colok Naga → x25\n• Shio → x9.5\n• 50:50 → x1\n\nIni sudah termasuk yang paling kompetitif di kelasnya, bosku! 😊`
    },

    // === SPORTBOOK / BOLA ===
    {
        keywords: ["bola", "sportbook", "sport", "sepak bola", "judi bola", "taruhan bola", "sbobet", "cmd368", "ubobet"],
        response: `Bosku, Sportsbook atau taruhan bola adalah salah satu produk unggulan kami! Kami menyediakan 3 provider terbaik:\n\n📌 **Provider Tersedia:**\n• **SBOBET** - Provider legendaris, pasaran terlengkap\n• **CMD368** - Odds kompetitif, cocok untuk player profesional\n• **UBOBET** - Interface ringan, proses cepat\n\n📌 **Jenis Taruhan Bola:**\n• **Handicap (HDP)** - Memberi vooran ke tim lemah\n• **Over/Under (O/U)** - Taruhan total gol di atas/bawah\n• **1X2** - Pilih Menang/Seri/Kalah (tanpa voor)\n• **Odd/Even** - Total gol ganjil atau genap\n• **Mix Parlay** - Gabung beberapa pertandingan (hadiah besar!)\n• **Correct Score** - Tebak skor tepat\n• **First Half / Full Time** - Taruhan babak 1 atau full\n• **Outright** - Juara liga / top scorer\n• **Corner Kick** - Taruhan jumlah corner\n• **First Goal/Last Goal** - Tim yang mencetak gol pertama/terakhir\n\n📌 **Liga Populer:**\nLiga Inggris, La Liga, Serie A, Bundesliga, Liga Champions, Piala Dunia, Liga Indonesia, dan ratusan liga lainnya!\n\nBosku mau tahu lebih lanjut tentang Mix Parlay atau Handicap?`
    },
    {
        keywords: ["mix parlay", "parlay", "gabung", "paket", "taruhan paket"],
        response: `Bosku, Mix Parlay adalah taruhan gabungan minimal **3 pertandingan** dalam 1 tiket. Hadiahnya bisa sangat besar dengan modal kecil!\n\n📌 **Cara Hitung Mix Parlay:**\nRumus: Odds pertandingan × Odds pertandingan × ... × Nilai Bet\n\n**Contoh:**\n• Pertandingan A: Odds 1.80 (MENANG)\n• Pertandingan B: Odds 2.10 (MENANG)\n• Pertandingan C: Odds 1.95 (MENANG)\n• Bet: 50.000\n\nHitungan: 1.80 × 2.10 × 1.95 × 50.000 = **367.770**\n\n📌 **Aturan Penting:**\n• Minimal **3 tim** dalam 1 tiket\n• Jika 1 tim kalah → **Tiket HANGUS**\n• Jika 1 tim SERI/DRAW → **Odds tim tersebut dihapus** (tidak dihitung)\n• Jika 1 tim MENANG SETENGAH → Odds tim tersebut dikurangi 1 lalu dibagi 2\n• Jika 1 tim KALAH SETENGAH → **Tiket HANGUS**\n• Bisa campur Handicap, O/U, 1X2 dalam 1 tiket\n\n📌 **Tips Parlay:**\n• Jangan terlalu banyak tim (3-5 optimal)\n• Campur liga besar dan liga kecil\n• Perhatikan form tim dan cedera pemain\n\nBosku butuh bantuan hitung parlay?`
    },
    {
        keywords: ["handicap", "voor", "vooran", "fur", "furan", "hdp"],
        response: `Bosku, Handicap (HDP) atau vooran adalah sistem untuk menyamakan kekuatan antara tim favorit dan tim non-favorit:\n\n📌 **Contoh Handicap:**\n**Real Madrid vs Almeria**\n• Real Madrid HDP -1.5 (Odds 1.90)\n• Artinya Real Madrid harus menang **minimal 2 gol** (2-0, 3-1, dll)\n• Jika menang 1 gol (1-0, 2-1) → **KALAH SETENGAH**\n• Jika seri atau kalah → **KALAH PENUH**\n\n📌 **Jenis Handicap:**\n• **0.0** (Tanpa Voor) - Menang full, kalah full\n• **0.25 / -0.25** - Menang Setengah / Kalah Setengah\n• **0.5 / -0.5** - Menang Full / Kalah Full\n• **0.75 / -0.75** - Menang Setengah/Kalah Setengah tergantung selisih\n• **1.0 / -1.0** - Harus menang minimal 1 gol, seri = kalah setengah\n• **1.25 / -1.25** - Menang 1 gol = menang setengah, menang 2+ = menang full\n• Dan seterusnya...\n\n📌 **Warna Odds:**\n• **Merah** = Odds di atas 1.00 (kei positif)\n• **Biru** = Odds di bawah 1.00 (kei negatif)\n\nBosku ada pertandingan yang ingin dihitungkan?`
    },

    "Bosku, sepertinya pertanyaannya belum bisa saya tangkap dengan baik. 🤔\n\nCoba bosku tulis ulang dengan lebih spesifik, misalnya:\n• \"Gimana cara main baccarat?\"\n• \"Hadiah togel 4D berapa?\"\n• \"Minimal bet slot berapa?\"\n\nCS selalu siap bantu bosku!"
];

const thanksResponses = [
    "Sama-sama bosku! 😊 Senang bisa membantu. Kalau ada pertanyaan lain, jangan ragu ya! CS Online 24 jam selalu siap melayani bosku.",
    "Terima kasih kembali bosku! 🔥 Semoga beruntung bermainnya! Ada yang mau ditanya lagi?",
    "Dengan senang hati bosku! 😊 Jangan sungkan kalau butuh bantuan lagi ya. Good luck bosku!"
];

const notUnderstandResponses = [
    "Bosku, mohon maaf saya belum bisa memahami pesan tersebut. 😅 Bisa dijelaskan lebih detail atau dengan kata kunci yang lebih spesifik?",
    "Maaf bosku, bisa diulangi atau dijelaskan lebih rinci? 😊 Supaya saya bisa bantu dengan tepat."
];

// =============================================
// LOGIC ENGINE
// =============================================

function findBestMatch(input) {
    const lower = input.toLowerCase().trim();
    let bestMatch = null;
    let bestScore = 0;

    for (const entry of knowledgeBase) {
        let score = 0;
        for (const keyword of entry.keywords) {
            if (lower.includes(keyword.toLowerCase())) {
                // Kata kunci yang lebih panjang = lebih spesifik = skor lebih tinggi
                score += keyword.length;
                // Bonus jika persis sama
                if (lower === keyword.toLowerCase()) score += 20;
                // Bonus jika di awal kalimat
                if (lower.startsWith(keyword.toLowerCase())) score += 5;
            }
        }
        if (score > bestScore) {
            bestScore = score;
            bestMatch = entry;
        }
    }

    return { match: bestMatch, score: bestScore };
}

function isGreeting(input) {
    const lower = input.toLowerCase().trim();
    const greets = ["halo", "hai", "hi", "hello", "hey", "selamat", "pagi", "siang", "sore", "malam", "assalamualaikum", "bro", "boss", "bos", "cs", "admin", "permisi", "pagi bosku", "malam bosku", "siang bosku"];
    return greets.some(g => lower === g || lower.startsWith(g) && lower.length < 20);
}

function isThanks(input) {
    const lower = input.toLowerCase().trim();
    const thanks = ["terima kasih", "makasih", "thanks", "thank you", "thx", "trs", "tks", "tkn", "suwun", "nuhun", "maturnuwun", "syukron", "ok", "oke", "sip", "siap", "paham", "mengerti", "udah", "sudah", "ga usah", "gak usah", "tidak usah"];
    return thanks.some(t => lower.includes(t));
}

function generateResponse(input) {
    const trimmed = input.trim();
    if (!trimmed) return null;

    // Cek greeting
    if (isGreeting(trimmed)) {
        return greetings[Math.floor(Math.random() * greetings.length)];
    }

    // Cek thanks
    if (isThanks(trimmed) && trimmed.length < 30) {
        return thanksResponses[Math.floor(Math.random() * thanksResponses.length)];
    }

    // Cek knowledge base
    const { match, score } = findBestMatch(trimmed);
    if (match && score >= 3) {
        return match.response;
    }

    // Jika terlalu pendek dan tidak dikenali
    if (trimmed.length < 4) {
        return notUnderstandResponses[Math.floor(Math.random() * notUnderstandResponses.length)];
    }

    // Fallback
    return fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
}

// =============================================
// UI ENGINE
// =============================================

const chatBody = document.getElementById('chatBody');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const typingIndicator = document.getElementById('typingIndicator');
const scrollBtn = document.getElementById('scrollBtn');

// Set tanggal
function setDateLabel() {
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('id-ID', options);
}
setDateLabel();

function getTime() {
    const now = new Date();
    return now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}

function formatMessage(text) {
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
}

function addMessage(text, sender, animate = true) {
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    if (!animate) row.style.animation = 'none';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'bot' ? 'CS' : 'ME';

    const content = document.createElement('div');
    content.className = 'msg-content';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatMessage(text);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    content.appendChild(bubble);
    content.appendChild(time);
    row.appendChild(avatar);
    row.appendChild(content);
    chatBody.appendChild(row);
    scrollToBottom();
}

function showQuickReplies(replies) {
    const container = document.createElement('div');
    container.className = 'quick-replies';
    replies.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = text;
        btn.onclick = () => {
            container.remove();
            handleUserMessage(text);
        };
        container.appendChild(btn);
    });
    chatBody.appendChild(container);
    scrollToBottom();
}

function showTyping() {
    typingIndicator.classList.add('show');
    scrollToBottom();
}

function hideTyping() {
    typingIndicator.classList.remove('show');
}

function scrollToBottom() {
    requestAnimationFrame(() => {
        chatBody.scrollTop = chatBody.scrollHeight;
    });
}

// Scroll button visibility
chatBody.addEventListener('scroll', () => {
    const diff = chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight;
    scrollBtn.classList.toggle('show', diff > 100);
});

function handleUserMessage(text) {
    addMessage(text, 'user');
    chatInput.value = '';
    autoResize(chatInput);
    sendBtn.disabled = true;

    showTyping();

    // Simulasi delay berdasarkan panjang jawaban
    const response = generateResponse(text);
    const delay = Math.min(800 + (response ? response.length * 3 : 500), 2500);

    setTimeout(() => {
        hideTyping();
        addMessage(response, 'bot');

        // Quick replies berdasarkan konteks
        setTimeout(() => {
            const lower = text.toLowerCase();
            if (isGreeting(text)) {
                showQuickReplies(['Cara daftar', 'Deposit', 'Game apa saja?', 'Bonus new member']);
            } else if (lower.includes('togel') && !lower.includes('hadiah') && !lower.includes('diskon') && !lower.includes('pasang') && !lower.includes('colok') && !lower.includes('shio')) {
                showQuickReplies(['Cara pasang togel', 'Hadiah & diskon', 'Colok bebas/jitu', 'Shio togel']);
            } else if (lower.includes('bola') && !lower.includes('parlay') && !lower.includes('handicap') && !lower.includes('over') && !lower.includes('under')) {
                showQuickReplies(['Mix Parlay', 'Handicap/Voor', 'Over/Under', 'Minimal bet']);
            } else if (lower.includes('casino') && !lower.includes('baccarat') && !lower.includes('roulette') && !lower.includes('sic bo') && !lower.includes('dadu') && !lower.includes('dragon')) {
                showQuickReplies(['Baccarat', 'Roulette', 'Sic Bo / Dadu', 'Dragon Tiger']);
            } else if (lower.includes('slot') && !lower.includes('gacor') && !lower.includes('rtp') && !lower.includes('pola')) {
                showQuickReplies(['Slot gacor', 'RTP slot', 'Minimal bet', 'Provider slot']);
            } else if (lower.includes('poker') || lower.includes('domino') || lower.includes('qiu') || lower.includes('ceme') || lower.includes('bandarq')) {
                showQuickReplies(['Texas Poker', 'DominoQQ', 'BandarQ', 'Bandar Ceme']);
            }
        }, 300);
    }, delay);
}

function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    handleUserMessage(text);
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    sendBtn.disabled = !el.value.trim();
}

function clearChat() {
    chatBody.innerHTML = `<div class="date-sep"><span id="dateLabel"></span></div>`;
    setDateLabel();
    setTimeout(() => {
        showTyping();
        setTimeout(() => {
            hideTyping();
            addMessage("Chat telah direset. Ada yang bisa saya bantu, bosku? 😊", 'bot');
            showQuickReplies(['Cara daftar', 'Game apa saja?', 'Deposit', 'Bonus']);
        }, 800);
    }, 300);
}

// Initial greeting
window.addEventListener('load', () => {
    setTimeout(() => {
        showTyping();
        setTimeout(() => {
            hideTyping();
            addMessage(greetings[0], 'bot');
            setTimeout(() => {
                showQuickReplies(['Cara daftar', 'Game apa saja?', 'Deposit', 'Bonus new member']);
            }, 300);
        }, 1200);
    }, 500);
});

// Focus input
chatInput.focus();
</script>
