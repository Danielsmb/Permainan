<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Rekening Bank via Xendit</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; background: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Validasi Rekening Bank</h2>
        <select id="bankCode">
            <option value="">-- Pilih Bank --</option>
            <option value="BCA">BCA</option>
            <option value="BRI">BRI</option>
            <option value="MANDIRI">Mandiri</option>
            <option value="BNI">BNI</option>
            <option value="BSI">BSI</option>
            <!-- Tambahkan kode bank lain dari Xendit Docs -->
        </select>
        <input type="text" id="accountNumber" placeholder="Masukkan Nomor Rekening" />
        <button onclick="validateAccount()">Cek Rekening</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        async function validateAccount() {
            const bankCode = document.getElementById('bankCode').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'none';

            if (!bankCode || !accountNumber) {
                showError('Harap pilih bank dan masukkan nomor rekening.');
                return;
            }

            try {
                const response = await fetch('/api/validate-bank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bank_code: bankCode, account_number: accountNumber })
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong>✅ Rekening Valid!</strong><br>
                        <p>Nama Pemilik: <strong>${data.account_holder}</strong></p>
                        <p>Nomor Rekening: ${data.account_number}</p>
                    `;
                } else {
                    showError(data.error || 'Rekening tidak ditemukan.');
                }
            } catch (err) {
                showError('Gagal terhubung ke server.');
            }

            resultDiv.style.display = 'block';
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result error';
            resultDiv.innerHTML = `<strong>❌ Validasi Gagal</strong><br>${message}`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
